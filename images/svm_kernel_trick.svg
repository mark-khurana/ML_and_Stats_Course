<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="Helvetica, Arial, sans-serif">
  <rect width="640" height="320" fill="#ffffff"/>

  <!-- LEFT PANEL: not linearly separable in 2D -->
  <text x="150" y="28" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">Original 2D data</text>
  <text x="150" y="300" text-anchor="middle" font-size="12" fill="#777">no straight line separates the classes</text>
  <rect x="30" y="40" width="240" height="230" fill="#fafafa" stroke="#ccc"/>

  <!-- red ring (disease) around blue core (healthy) -->
  <g fill="#c0392b">
    <circle cx="150" cy="70" r="6"/>
    <circle cx="210" cy="95" r="6"/>
    <circle cx="235" cy="155" r="6"/>
    <circle cx="205" cy="215" r="6"/>
    <circle cx="150" cy="240" r="6"/>
    <circle cx="90" cy="215" r="6"/>
    <circle cx="63" cy="155" r="6"/>
    <circle cx="92" cy="95" r="6"/>
  </g>
  <g fill="#2e6fb7">
    <circle cx="150" cy="135" r="6"/>
    <circle cx="175" cy="160" r="6"/>
    <circle cx="130" cy="175" r="6"/>
    <circle cx="160" cy="190" r="6"/>
  </g>
  <!-- a failed straight line attempt -->
  <line x1="50" y1="220" x2="250" y2="90" stroke="#888" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- ARROW -->
  <text x="320" y="150" text-anchor="middle" font-size="13" fill="#333">kernel</text>
  <text x="320" y="167" text-anchor="middle" font-size="13" fill="#333">trick</text>
  <line x1="285" y1="180" x2="355" y2="180" stroke="#333" stroke-width="2"/>
  <polygon points="355,180 345,174 345,186" fill="#333"/>

  <!-- RIGHT PANEL: separable after lifting to higher dimension -->
  <text x="490" y="28" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">After mapping to higher dimension</text>
  <text x="490" y="300" text-anchor="middle" font-size="12" fill="#777">a flat boundary now separates them</text>
  <rect x="370" y="40" width="240" height="230" fill="#fafafa" stroke="#ccc"/>

  <!-- blue core lifted low, red ring lifted high (new axis = distance from centre) -->
  <line x1="490" y1="175" x2="600" y2="120" stroke="#222" stroke-width="2.5"/>
  <text x="585" y="112" font-size="11" fill="#222">boundary</text>
  <g fill="#2e6fb7">
    <circle cx="430" cy="225" r="6"/>
    <circle cx="470" cy="235" r="6"/>
    <circle cx="455" cy="215" r="6"/>
    <circle cx="495" cy="230" r="6"/>
  </g>
  <g fill="#c0392b">
    <circle cx="400" cy="110" r="6"/>
    <circle cx="440" cy="95" r="6"/>
    <circle cx="480" cy="105" r="6"/>
    <circle cx="520" cy="90" r="6"/>
    <circle cx="555" cy="110" r="6"/>
    <circle cx="585" cy="95" r="6"/>
    <circle cx="420" cy="130" r="6"/>
    <circle cx="560" cy="135" r="6"/>
  </g>
  <text x="378" y="60" font-size="11" fill="#777" transform="rotate(-90 378 60)">new feature</text>
</svg>
